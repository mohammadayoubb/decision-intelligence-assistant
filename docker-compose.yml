version: "3.9"

services:
  backend:
    build: .
    container_name: decision-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs

  frontend:
    build: ./frontend
    container_name: decision-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend