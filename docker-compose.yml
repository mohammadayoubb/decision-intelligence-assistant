version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: decision-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  backend:
    build: .
    container_name: decision-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./logs:/app/logs
    depends_on:
      - qdrant

  frontend:
    build: ./frontend
    container_name: decision-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  qdrant_storage: